<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7b2229">
  <title>Mi Bodega</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="phone-shell" aria-label="Catalogo de vino">
    <header class="app-header">
      <div class="statusbar" aria-hidden="true">
        <strong>9:41</strong>
        <span></span>
      </div>
      <nav class="nav-actions" aria-label="Acciones principales">
        <button class="round-button menu-button" type="button" aria-label="Abrir menu">
          <span></span><span></span><span></span>
        </button>
        <button class="round-button search-button" type="button" aria-label="Buscar">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
        </button>
      </nav>
      <div class="vine-art" aria-hidden="true">
        <span class="leaf leaf-a"></span>
        <span class="leaf leaf-b"></span>
        <span class="leaf leaf-c"></span>
      </div>
      <section class="hero-title">
        <svg class="brand-mark" viewBox="0 0 92 72" aria-hidden="true">
          <path d="M45 7h8v31h8v21H31V38h8V7h6Z"/>
          <path d="M14 60c7-13 21-13 32-4 11-9 25-9 32 4"/>
          <circle cx="25" cy="47" r="5"/><circle cx="34" cy="41" r="5"/><circle cx="42" cy="50" r="5"/>
        </svg>
        <p>MI BODEGA</p>
        <span>Tu coleccion de vino</span>
      </section>
    </header>

    <section class="summary-card" aria-label="Resumen del catalogo">
      <article>
        <span class="metric-icon bottle-mini"></span>
        <strong id="totalBottles">0</strong>
        <small>Botellas</small>
      </article>
      <article>
        <span class="dot red"></span>
        <strong id="redCount">0</strong>
        <small>Tintos</small>
      </article>
      <article>
        <span class="dot white"></span>
        <strong id="whiteCount">0</strong>
        <small>Blancos</small>
      </article>
      <article>
        <span class="dot rose"></span>
        <strong id="roseCount">0</strong>
        <small>Rosados</small>
      </article>
    </section>

    <section class="section-heading">
      <div>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h13M4 12h8M4 17h13"/></svg>
        <h1>Bodega</h1>
      </div>
      <label>Ordenar por
        <select id="sortSelect">
          <option value="name">Nombre</option>
          <option value="price">Precio</option>
          <option value="year">Anada</option>
        </select>
      </label>
    </section>

    <section id="wineList" class="wine-list" aria-label="Botellas"></section>

    <button id="addButton" class="floating-button" type="button" aria-label="Anadir botella">+</button>
  </main>

  <dialog id="wineDialog">
    <form id="wineForm" method="dialog">
      <h2>Nueva botella</h2>
      <label>Nombre<input name="name" required placeholder="Botella 4"></label>
      <label>Tipo
        <select name="type">
          <option>Tinto</option>
          <option>Blanco</option>
          <option>Rosado</option>
        </select>
      </label>
      <label>Precio<input name="price" required inputmode="decimal" placeholder="25,00"></label>
      <label>Anada<input name="year" required inputmode="numeric" placeholder="2021"></label>
      <label>Descripcion<textarea name="description" rows="3" placeholder="Notas de cata, crianza y maridaje"></textarea></label>
      <div class="dialog-actions">
        <button type="button" id="cancelButton">Cancelar</button>
        <button>Guardar</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
